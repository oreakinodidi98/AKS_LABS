apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lustre
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/oreakinodidi98/AKS_LABS.git
    targetRevision: HEAD
    path: AKS_AI_and_LLM/AI_Runway/manifests/lustre
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true