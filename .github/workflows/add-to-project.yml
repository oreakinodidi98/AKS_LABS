name: Add new issues to this GH Project

on:
  issues:
    types:
      - opened

env:
  PROJECT_URL: ${{ vars.PROJECT_URL }}

jobs:
  add-to-project:
    name: Add issue to project
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      repository-projects: write
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: ${{ env.PROJECT_URL }}
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT || secrets.GITHUB_TOKEN }}
  label_issues:
    needs: add-to-project
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - run: |
          if [ -n "$LABELS" ]; then
            EXISTING_LABELS=$(gh label list --limit 1000 --json name --jq '.[].name')
            declare -A EXISTING_LABEL_MAP
            while IFS= read -r existing_label; do
              [ -z "$existing_label" ] && continue
              EXISTING_LABEL_MAP["$existing_label"]=1
            done <<< "$EXISTING_LABELS"
            while IFS= read -r label; do
              [ -z "$label" ] && continue
              if [ -n "${EXISTING_LABEL_MAP["$label"]}" ]; then
                gh issue edit "$NUMBER" --add-label "$label"
              else
                echo "Label '$label' does not exist in repository, skipping."
              fi
            done < <(echo "$LABELS" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          else
            echo "No label to add."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number }}
          LABELS: ${{ vars.ISSUE_LABEL }}